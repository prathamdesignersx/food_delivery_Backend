name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          find config controllers middleware models routes -name "*.js" -print0 | xargs -0 -n1 node --check

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: /var/www/backend
      PM2_APP_NAME: backend
      PORT: 4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required deployment secrets
        run: |
          test -n "${{ secrets.LIGHTSAIL_HOST }}" || (echo "Missing GitHub Secret: LIGHTSAIL_HOST" && exit 1)
          test -n "${{ secrets.LIGHTSAIL_USER }}" || (echo "Missing GitHub Secret: LIGHTSAIL_USER" && exit 1)
          test -n "${{ secrets.LIGHTSAIL_SSH_KEY }}" || (echo "Missing GitHub Secret: LIGHTSAIL_SSH_KEY" && exit 1)
          test -n "${{ secrets.JWT_SECRET }}" || (echo "Missing GitHub Secret: JWT_SECRET" && exit 1)
          test -n "${{ secrets.SALT }}" || (echo "Missing GitHub Secret: SALT" && exit 1)
          test -n "${{ secrets.MONGO_URL }}" || (echo "Missing GitHub Secret: MONGO_URL" && exit 1)
          test -n "${{ secrets.STRIPE_SECRET_KEY }}" || (echo "Missing GitHub Secret: STRIPE_SECRET_KEY" && exit 1)
          test -n "${{ secrets.FRONTEND_URL }}" || (echo "Missing GitHub Secret: FRONTEND_URL" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" | tr -d '\r' > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload backend files
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.env' -czf /tmp/backend.tar.gz .
          scp -i ~/.ssh/lightsail_key -P "${{ secrets.LIGHTSAIL_PORT || '22' }}" /tmp/backend.tar.gz "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/backend.tar.gz"
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "mkdir -p $DEPLOY_PATH && tar -xzf /tmp/backend.tar.gz -C $DEPLOY_PATH && rm /tmp/backend.tar.gz"

      - name: Write production env file
        run: |
          cat > .env.production << 'EOF'
          PORT=${{ env.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SALT=${{ secrets.SALT }}
          MONGO_URL=${{ secrets.MONGO_URL }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          EOF
          scp -i ~/.ssh/lightsail_key -P "${{ secrets.LIGHTSAIL_PORT || '22' }}" .env.production "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/backend.env"
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "mv /tmp/backend.env $DEPLOY_PATH/.env && chmod 600 $DEPLOY_PATH/.env"

      - name: Install dependencies and restart PM2
        run: |
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "cd $DEPLOY_PATH && npm ci --omit=dev && (pm2 restart $PM2_APP_NAME || pm2 start server.js --name $PM2_APP_NAME) && pm2 save"
