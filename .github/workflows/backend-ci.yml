name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check backend code
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Check JavaScript files
        run: |
          node --check server.js
          find config controllers middleware models routes -name "*.js" -print0 | xargs -0 -n1 node --check

  deploy:
    name: Deploy safely to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      SSH_USER: ${{ secrets.LIGHTSAIL_USER }}
      SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
      SSH_PORT: ${{ secrets.LIGHTSAIL_PORT || '22' }}

      APP_DIR: /var/www/backend
      NEW_RELEASE_DIR: /tmp/backend-release-${{ github.sha }}
      BACKUP_FILE: /tmp/backend-backup-${{ github.sha }}.tar.gz

      PM2_APP_NAME: backend
      PORT: 4000

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          test -n "$SSH_HOST" || (echo "Missing LIGHTSAIL_HOST" && exit 1)
          test -n "$SSH_USER" || (echo "Missing LIGHTSAIL_USER" && exit 1)
          test -n "$SSH_KEY" || (echo "Missing LIGHTSAIL_SSH_KEY" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload new code safely
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='uploads' -czf /tmp/backend.tar.gz .

          scp -i ~/.ssh/server_key -P "$SSH_PORT" /tmp/backend.tar.gz "$SSH_USER@$SSH_HOST:/tmp/backend.tar.gz"

          ssh -i ~/.ssh/server_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e

            rm -rf '$NEW_RELEASE_DIR'
            mkdir -p '$NEW_RELEASE_DIR'

            tar -xzf /tmp/backend.tar.gz -C '$NEW_RELEASE_DIR'
            rm /tmp/backend.tar.gz

            if [ -f '$APP_DIR/.env' ]; then
              cp '$APP_DIR/.env' '$NEW_RELEASE_DIR/.env'
            fi

            if [ -d '$APP_DIR/uploads' ]; then
              cp -a '$APP_DIR/uploads' '$NEW_RELEASE_DIR/uploads'
            else
              mkdir -p '$NEW_RELEASE_DIR/uploads'
            fi
          "

      - name: Test new code before replacing old code
        run: |
          ssh -i ~/.ssh/server_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e

            cd '$NEW_RELEASE_DIR'

            npm ci --omit=dev
            node --check server.js
            find config controllers middleware models routes -name '*.js' -print0 | xargs -0 -n1 node --check
          "

      - name: Replace old code with new code
        id: activate
        run: |
          ssh -i ~/.ssh/server_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e

            mkdir -p '$APP_DIR'

            cd '$APP_DIR'
            tar -czf '$BACKUP_FILE' .

            find '$APP_DIR' -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -C '$NEW_RELEASE_DIR' -cf - . | tar -C '$APP_DIR' -xf -

            cd '$APP_DIR'

            pm2 restart '$PM2_APP_NAME' || pm2 start server.js --name '$PM2_APP_NAME'
            pm2 save

            sleep 3
            curl -fsS http://127.0.0.1:$4000/
          "

      - name: Restore old code if new code fails
        if: failure() && steps.activate.outcome == 'failure'
        run: |
          ssh -i ~/.ssh/server_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e

            if [ ! -f '$BACKUP_FILE' ]; then
              echo 'No backup found'
              exit 1
            fi

            mkdir -p '$APP_DIR'

            find '$APP_DIR' -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -xzf '$BACKUP_FILE' -C '$APP_DIR'

            cd '$APP_DIR'

            pm2 restart '$PM2_APP_NAME' || pm2 start server.js --name '$PM2_APP_NAME'
            pm2 save

            curl -fsS http://127.0.0.1:$4000/
          "