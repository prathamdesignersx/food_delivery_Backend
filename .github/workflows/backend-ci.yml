name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          find config controllers middleware models routes -name "*.js" -print0 | xargs -0 -n1 node --check

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: /var/www/backend
      RELEASES_PATH: /var/www/backend-releases
      RELEASE_PATH: /var/www/backend-releases/${{ github.sha }}
      PREVIOUS_PATH: /var/www/backend.previous
      PM2_APP_NAME: backend
      PORT: 4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required deployment secrets
        run: |
          test -n "${{ secrets.LIGHTSAIL_HOST }}" || (echo "Missing GitHub Secret: LIGHTSAIL_HOST" && exit 1)
          test -n "${{ secrets.LIGHTSAIL_USER }}" || (echo "Missing GitHub Secret: LIGHTSAIL_USER" && exit 1)
          test -n "${{ secrets.LIGHTSAIL_SSH_KEY }}" || (echo "Missing GitHub Secret: LIGHTSAIL_SSH_KEY" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" | tr -d '\r' > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload backend files to new release
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='uploads' -czf /tmp/backend-${{ github.sha }}.tar.gz .
          scp -i ~/.ssh/lightsail_key -P "${{ secrets.LIGHTSAIL_PORT || '22' }}" /tmp/backend-${{ github.sha }}.tar.gz "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/backend-${{ github.sha }}.tar.gz"
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "
            set -e
            mkdir -p '$RELEASES_PATH'
            rm -rf '$RELEASE_PATH'
            mkdir -p '$RELEASE_PATH'
            tar -xzf /tmp/backend-${{ github.sha }}.tar.gz -C '$RELEASE_PATH'
            rm /tmp/backend-${{ github.sha }}.tar.gz

            if [ -f '$DEPLOY_PATH/.env' ]; then
              cp '$DEPLOY_PATH/.env' '$RELEASE_PATH/.env'
            fi

            if [ -d '$DEPLOY_PATH/uploads' ]; then
              cp -a '$DEPLOY_PATH/uploads' '$RELEASE_PATH/uploads'
            else
              mkdir -p '$RELEASE_PATH/uploads'
            fi
          "

      - name: Validate new release before activation
        run: |
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "
            set -e
            cd '$RELEASE_PATH'
            npm ci --omit=dev
            node --check server.js
            find config controllers middleware models routes -name '*.js' -print0 | xargs -0 -n1 node --check
          "

      - name: Activate new release
        id: activate_release
        run: |
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "
            set -e
            rm -rf '$PREVIOUS_PATH'

            if [ -d '$DEPLOY_PATH' ]; then
              mv '$DEPLOY_PATH' '$PREVIOUS_PATH'
            fi

            mv '$RELEASE_PATH' '$DEPLOY_PATH'
            cd '$DEPLOY_PATH'
            (pm2 restart '$PM2_APP_NAME' || pm2 start server.js --name '$PM2_APP_NAME')
            pm2 save
            sleep 3
            curl -fsS http://127.0.0.1:$PORT/
          "

      - name: Restore old release if activation fails
        if: failure() && steps.activate_release.outcome == 'failure'
        run: |
          ssh -i ~/.ssh/lightsail_key -p "${{ secrets.LIGHTSAIL_PORT || '22' }}" "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" "
            set -e

            if [ ! -d '$PREVIOUS_PATH' ]; then
              echo 'No previous release found. Current server files were not replaced before this failure.'
              exit 1
            fi

            rm -rf '$DEPLOY_PATH'
            mv '$PREVIOUS_PATH' '$DEPLOY_PATH'
            cd '$DEPLOY_PATH'
            (pm2 restart '$PM2_APP_NAME' || pm2 start server.js --name '$PM2_APP_NAME')
            pm2 save
            curl -fsS http://127.0.0.1:$PORT/
          "
